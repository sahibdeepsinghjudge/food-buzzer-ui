<ui-button-container [ngSwitch]="variant">
  <div *ngSwitchCase="'primary'">
    <button
      class="bg-primary text-white px-8 py-2 rounded-4xl hover:px-12 transition-all"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
  <div *ngSwitchCase="'secondary'">
    <button
      class="bg-secondary text-white px-8 py-2 rounded-4xl hover:px-12 transition-all"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
  <div *ngSwitchCase="'black'">
    <button
      class="bg-black text-primary px-8 py-2 rounded-4xl hover:px-12 transition-all"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
  <div *ngSwitchCase="'primary-full'">
    <button
      class="bg-primary text-white px-8 py-2 rounded-4xl hover:px-12 transition-all w-full"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
  <div *ngSwitchCase="'secondary-full'">
    <button
      class="bg-secondary text-white px-8 py-2 rounded-4xl hover:px-12 transition-all w-full"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
  <div *ngSwitchCase="'black-full'">
    <button
      class="bg-black text-primary px-8 py-2 rounded-4xl hover:px-12 transition-all w-full"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
  <div *ngSwitchDefault>
    <button
      class="bg-white text-black border-2 border-black px-8 py-2 rounded-4xl hover:px-12 transition-all"
      (click)="handleClick()"
    >
      {{ text }}
    </button>
  </div>
</ui-button-container>
