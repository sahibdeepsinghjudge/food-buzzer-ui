<div class="bg-white rounded-xl shadow-sm border border-neutral-200 min-w-[200px] min-h-[100px]">
  <div class="px-4 py-3 border-b-2 border-neutral-200">
    <div class="text-sm text-neutral-500">{{ label }}</div>
  </div>
  <p class="text-3xl text-primary font-bold px-4 py-4">{{ number }}</p>
  <div class="px-4 py-3 border-t-2 border-neutral-200">
    <p class="text-sm" [class.text-green-500]="isPositive" [class.text-red-500]="!isPositive">
      {{ comparison_number_percentage }}%
      <span class="text-neutral-500">vs {{ comparison_parameter }}</span>
    </p>
  </div>
</div>
