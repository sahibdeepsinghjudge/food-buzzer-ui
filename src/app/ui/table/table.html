<div class="w-full max-w-6xl overflow-x-auto mt-4 rounded-xl">
  <table class="w-full text-sm border border-neutral-200 rounded-xl overflow-hidden">
    <thead class="bg-white text-primary uppercase text-xs tracking-wider">
      <tr>
        <th *ngFor="let column of columns" class="px-6 py-4 text-left border-b border-neutral-200">
          {{ column.label }}
        </th>
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="let row of data"
        class="bg-white cursor-pointer hover:bg-neutral-50 transition-colors"
      >
        <td *ngFor="let column of columns" class="px-6 py-4 border-b border-neutral-100">
          <!-- TEXT -->
          <ng-container *ngIf="!column.type || column.type === 'text'">
            {{ row[column.key] }}
          </ng-container>

          <!-- BUTTON -->
          <button
            *ngIf="column.type === 'button'"
            (click)="handleClick(column, row)"
            class="bg-primary text-white px-4 py-2 rounded-lg text-sm"
          >
            {{ column.buttonText || 'Action' }}
          </button>

          <a
            *ngIf="column.type === 'link'"
            [routerLink]="[column.routerLink, row.id]"
            class="text-primary hover:underline"
          >
            {{ row[column.key] }}
          </a>

          <!-- MULTIPLE ACTIONS -->
          <div *ngIf="column.type === 'actions'" class="flex gap-2">
            <button
              *ngFor="let acc of column.actions"
              (click)="acc.onClick(row)"
              class="px-4 py-2 rounded-lg text-sm transition-colors"
              [ngClass]="{
                'bg-red-50 text-red-600 hover:bg-red-100': acc.variant === 'danger',
                'bg-neutral-100 text-neutral-600 hover:bg-neutral-200': acc.variant === 'secondary',
                'bg-primary text-white hover:bg-primary/90':
                  !acc.variant || acc.variant === 'primary',
              }"
            >
              {{ acc.label }}
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
