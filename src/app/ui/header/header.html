<header class="bg-white fixed w-screen h-16 flex items-center justify-between px-4">
  <app-logo></app-logo>
  <nav>
    <ul class="flex items-center gap-4">
      <li *ngFor="let item of navItems">
        <app-nav-item [text]="item.text" [link]="item.link"></app-nav-item>
      </li>
      <li *ngIf="userEmail" class="flex items-center gap-2 border-r border-neutral-200 pr-4 mr-2">
        <div class="text-right">
          <p class="text-sm font-medium text-neutral-800 leading-tight">{{ userEmail }}</p>
          <p class="text-xs text-neutral-500 leading-tight capitalize">{{ userRole }}</p>
        </div>
      </li>
      <ui-button
        text="Logout"
        variant="logout"
        (clicked)="logout()"
        [isLoading]="isSubmitting()"
      ></ui-button>
    </ul>
  </nav>
</header>
