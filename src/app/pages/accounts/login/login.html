<accounts-container>
  <ng-content title>
    <p class="text-neutral-500 text-lg">continue with</p>
  </ng-content>
  <form action="" class="w-full flex flex-col gap-2 mt-8">
    <input-field placeholder="Email" type="email" name="email" id="email" value=""></input-field>
    <input-field
      placeholder="Password"
      type="password"
      name="password"
      id="password"
      value=""
    ></input-field>
    <p class="text-right text-sm text-primary"></p>
    <ui-button text="login" variant="primary-full" radius="2xl"> </ui-button>
    <p class="text-center text-sm text-primary">Forgot Password?</p>
    <p class="text-center text-sm text-neutral-500">
      Don't have an account?
      <a routerLink="/accounts/register" class="text-primary cursor-pointer">Register</a>
    </p>
  </form>
</accounts-container>
