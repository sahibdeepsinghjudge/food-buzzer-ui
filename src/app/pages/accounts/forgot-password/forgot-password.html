<accounts-container>
  <ng-content title>
    <p class="text-neutral-500 text-lg">forgot your password</p>
    <h1 class="text-4xl my-1 font-bold text-primary">foodBuzzer</h1>
  </ng-content>
  <ng-content>
    <p class="mt-3"></p>

    <input-field name="email" type="email" placeholder="Enter your email"></input-field>
    <p class="my-3"></p>
    <ui-button text="Request Password Reset" variant="primary-full" radius="xl"></ui-button>
    <div class="text-center mt-4">
      <p class="text-neutral-500">
        Already have an account?
        <a routerLink="/accounts/login" class="text-primary cursor-pointer">Login</a>
      </p>
    </div>
  </ng-content>
</accounts-container>
