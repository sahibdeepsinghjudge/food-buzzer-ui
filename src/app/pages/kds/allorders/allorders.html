<app-kdsscreen [activeText]="'View All'" [activeLink]="'/kds/view-all'" [orderLength]="orderLength">
  <h1 class="m-5 text-2xl font-semibold">All Orders</h1>
  <div class="grid grid-cols-[repeat(auto-fit,minmax(20rem,1fr))] gap-6 m-5">
    <div
      *ngFor="let item of orderedData"
      class="bg-white rounded-xl shadow py-5 flex flex-col border border-neutral-200"
    >
      <div class="px-6">
        <div class="flex justify-between text-sm text-neutral-500">
          <p>Table: {{ item.tableId || '-' }}</p>
          <p>{{ item.createdAt }}</p>
        </div>
        <p class="font-semibold text-lg mt-1">Order #{{ item.orderId }}</p>
      </div>
      <hr class="my-2" />
      <div class="px-6">
        <p class="text-sm">
          <span class="text-neutral-500">Customer:</span> {{ item.customerName }}
        </p>
        <p class="text-sm"><span class="text-neutral-500">Phone:</span> {{ item.customerPhone }}</p>
      </div>
      <hr class="my-2" />
      <div *ngFor="let i of item.cartItems" class="px-6">
        <p class="font-medium text-sm py-1">
          {{ i.quantity }}x {{ i.name }} <span class="text-neutral-400">— ₹{{ i.totalPrice }}</span>
        </p>
      </div>

      <!-- View Details & Bill -->
      <div class="px-6 pt-3 flex gap-2">
        <a
          [routerLink]="['/kds/order', item.orderId]"
          class="text-primary text-sm font-medium hover:underline cursor-pointer"
          >View Details</a
        >
        <span class="text-neutral-300">|</span>
        <a
          [routerLink]="['/kds/order', item.orderId]"
          class="text-neutral-600 text-sm font-medium hover:underline cursor-pointer"
          >See Bill</a
        >
      </div>

      <!-- Status Actions -->
      <div class="px-4 pt-3 mt-auto flex gap-1 relative">
        <button
          *ngIf="item.status === 'PENDING'"
          (click)="toggleDropDown(item.orderId)"
          class="bg-yellow-500 text-white flex-1 py-2.5 rounded-lg hover:bg-yellow-600 cursor-pointer text-sm font-medium"
        >
          Pending
        </button>
        <div
          *ngIf="activeDropDown === item.orderId"
          class="absolute right-0 top-0 h-full w-1/2 bg-white border border-neutral-300 rounded-lg flex flex-col shadow-md z-10"
        >
          <button
            class="flex-1 text-green-600 hover:bg-gray-100 cursor-pointer text-sm font-medium"
            (click)="updateStatus(item.orderId, 'ACCEPTED')"
          >
            Accept
          </button>
          <button
            class="flex-1 text-red-600 border-t border-gray-200 hover:bg-gray-100 cursor-pointer text-sm font-medium"
            (click)="updateStatus(item.orderId, 'DECLINED')"
          >
            Decline
          </button>
        </div>
        <button
          *ngIf="item.status === 'ACCEPTED'"
          class="bg-green-500 text-white flex-1 py-2.5 rounded-lg hover:bg-green-700 cursor-pointer text-sm font-medium"
          (click)="updateStatus(item.orderId, 'COOKING')"
        >
          Accepted — Start Cooking
        </button>
        <button
          *ngIf="item.status === 'COOKING'"
          class="bg-orange-400 text-white flex-1 py-2.5 rounded-lg hover:bg-orange-700 cursor-pointer text-sm font-medium"
          (click)="updateStatus(item.orderId, 'PREPARED')"
        >
          Cooking — Mark Prepared
        </button>
        <button
          *ngIf="item.status === 'PREPARED'"
          class="bg-blue-500 text-white flex-1 py-2.5 rounded-lg hover:bg-blue-800 cursor-pointer text-sm font-medium"
          (click)="updateStatus(item.orderId, 'COMPLETED')"
        >
          Prepared — Complete
        </button>
        <p
          *ngIf="item.status === 'DECLINED'"
          class="text-red-500 flex-1 py-2.5 text-center font-medium"
        >
          ✕ Declined
        </p>
        <p
          *ngIf="item.status === 'COMPLETED'"
          class="text-green-500 flex-1 py-2.5 text-center font-medium"
        >
          ✓ Completed
        </p>
      </div>
    </div>
  </div>
</app-kdsscreen>
