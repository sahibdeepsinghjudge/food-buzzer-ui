<div class="px-6 py-6 font-primary text-neutral-800">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Orders Overview</h1>
  </div>

  <!-- Dashboard Tiles -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
    <!-- Active -->
    <div
      class="bg-white p-5 rounded-2xl border border-neutral-100 shadow-sm flex flex-col items-center justify-center hover:shadow-md transition-shadow"
    >
      <div
        class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mb-3"
      >
        <mat-icon>local_activity</mat-icon>
      </div>
      <p class="text-sm font-semibold text-neutral-500 mb-1">Active</p>
      <p class="text-3xl font-bold">{{ activeCount }}</p>
    </div>

    <!-- Pending -->
    <div
      class="bg-white p-5 rounded-2xl border border-neutral-100 shadow-sm flex flex-col items-center justify-center hover:shadow-md transition-shadow"
    >
      <div
        class="w-10 h-10 rounded-full bg-yellow-50 text-yellow-600 flex items-center justify-center mb-3"
      >
        <mat-icon>hourglass_empty</mat-icon>
      </div>
      <p class="text-sm font-semibold text-neutral-500 mb-1">Pending</p>
      <p class="text-3xl font-bold">{{ pendingCount }}</p>
    </div>

    <!-- Prepared -->
    <div
      class="bg-white p-5 rounded-2xl border border-neutral-100 shadow-sm flex flex-col items-center justify-center hover:shadow-md transition-shadow"
    >
      <div
        class="w-10 h-10 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center mb-3"
      >
        <mat-icon>restaurant_menu</mat-icon>
      </div>
      <p class="text-sm font-semibold text-neutral-500 mb-1">Prepared</p>
      <p class="text-3xl font-bold">{{ preparedCount }}</p>
    </div>

    <!-- Completed -->
    <div
      class="bg-white p-5 rounded-2xl border border-neutral-100 shadow-sm flex flex-col items-center justify-center hover:shadow-md transition-shadow"
    >
      <div
        class="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center mb-3"
      >
        <mat-icon>check_circle</mat-icon>
      </div>
      <p class="text-sm font-semibold text-neutral-500 mb-1">Completed</p>
      <p class="text-3xl font-bold">{{ completedCount }}</p>
    </div>

    <!-- Declined -->
    <div
      class="bg-white p-5 rounded-2xl border border-neutral-100 shadow-sm flex flex-col items-center justify-center hover:shadow-md transition-shadow"
    >
      <div
        class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center mb-3"
      >
        <mat-icon>cancel</mat-icon>
      </div>
      <p class="text-sm font-semibold text-neutral-500 mb-1">Declined</p>
      <p class="text-3xl font-bold">{{ declinedCount }}</p>
    </div>
  </div>

  <div class="bg-white p-6 rounded-[32px] border border-neutral-200 flex flex-col gap-6 shadow-sm">
    <!-- Header Tools (Search) -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="w-full sm:max-w-md relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <mat-icon class="text-neutral-400 text-sm">search</mat-icon>
        </div>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="filterOrders()"
          placeholder="Search by phone number..."
          class="w-full pl-11 pr-4 py-3 bg-neutral-50 border border-neutral-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
        />
      </div>
    </div>

    <app-table [data]="tableData" [columns]="tableColumns"></app-table>
    <div
      *ngIf="tableData.length === 0"
      class="text-center py-10 text-neutral-400 border border-dashed rounded-xl mt-4"
    >
      <p class="text-lg">No orders found matching your search</p>
    </div>
  </div>
</div>
