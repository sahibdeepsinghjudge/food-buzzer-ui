<div class="mx-auto">
  <!-- Back Button -->
  <a
    routerLink="/team"
    class="inline-flex items-center text-neutral-500 hover:text-primary transition-colors mb-6 text-sm font-medium"
  >
    <mat-icon class="mr-1 text-sm w-4 h-4">arrow_back</mat-icon>
    Back to Teams
  </a>

  <div class="bg-white rounded-[32px] p-8 md:p-12 shadow-sm border border-neutral-100">
    <!-- Header -->
    <div class="mb-10 pb-8 border-b border-neutral-100">
      <h2 class="text-3xl font-bold text-neutral-800">Add Team Member</h2>
      <p class="text-neutral-500 text-lg mt-2">Invite a new teammate to the organization.</p>
    </div>

    <!-- Forms Area -->
    <form [formGroup]="memberForm" (ngSubmit)="saveChanges()" class="w-full md:w-1/2 space-y-8">
      <div>
        <h3 class="text-lg font-semibold text-neutral-700 mb-4">Basic Information</h3>
        <div class="space-y-6">
          <input-field
            label="Full Name"
            id="name"
            name="name"
            placeholder="John Doe"
            formControlName="name"
          ></input-field>

          <input-field
            label="Email Address"
            id="email"
            name="email"
            type="email"
            placeholder="john@example.com"
            formControlName="email"
          ></input-field>
        </div>
      </div>

      <div class="pt-6 border-t border-neutral-100">
        <h3 class="text-lg font-semibold text-neutral-700 mb-4">Permissions</h3>
        <select-input
          label="Access Level"
          id="accessLevel"
          name="accessLevel"
          formControlName="accessLevel"
          [options]="accessLevelOptions"
        >
        </select-input>
        <p class="text-xs text-neutral-400 mt-2">
          Level 0 is lowest (read-only), Level 5 is highest (admin).
        </p>
      </div>

      <!-- Actions -->
      <div class="pt-6 mt-6 border-t border-neutral-100">
        <h3 class="text-lg font-semibold text-neutral-700 mb-6">Account Actions</h3>
        <div class="flex flex-col sm:flex-row gap-4">
          <ui-button type="submit" text="Invite Member" variant="primary" [isLoading]="isSaving()">
          </ui-button>
        </div>
      </div>
    </form>
  </div>
</div>
