<div class="mx-auto">
  <!-- Back Button -->
  <a
    routerLink="/teams"
    class="inline-flex items-center text-neutral-500 hover:text-primary transition-colors mb-6 text-sm font-medium"
  >
    <mat-icon class="mr-1 text-sm w-4 h-4">arrow_back</mat-icon>
    Back to Teams
  </a>

  <!-- Loading State -->
  <div *ngIf="isLoading()" class="flex justify-center items-center py-20">
    <mat-icon class="animate-spin text-primary text-4xl w-10 h-10">autorenew</mat-icon>
  </div>

  <div
    *ngIf="!isLoading() && member() as m"
    class="bg-white rounded-[32px] p-8 md:p-12 shadow-sm border border-neutral-100"
  >
    <!-- Header -->
    <div
      class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10 pb-8 border-b border-neutral-100"
    >
      <div class="flex items-center gap-6">
        <div
          class="w-20 h-20 rounded-full bg-blue-50 text-blue-600 flex justify-center items-center text-3xl font-bold"
        >
          {{ m.name.charAt(0).toUpperCase() }}
        </div>
        <div>
          <h2 class="text-3xl font-bold text-neutral-800">{{ m.name }}</h2>
          <p class="text-neutral-500 text-lg">{{ m.email }}</p>
        </div>
      </div>

      <!-- Status Badge -->
      <div
        [ngClass]="{
          'bg-green-50 text-green-700 ring-green-600/20': m.status === 'Active',
          'bg-red-50 text-red-700 ring-red-600/10': m.status === 'Inactive',
        }"
        class="inline-flex items-center rounded-md px-3 py-1 text-sm font-medium ring-1 ring-inset w-max"
      >
        {{ m.status }}
      </div>
    </div>

    <!-- Forms Area -->
    <form [formGroup]="memberForm" (ngSubmit)="saveChanges()" class="w-full md:w-1/2 space-y-8">
      <!-- Access Level Select -->
      <div>
        <h3 class="text-lg font-semibold text-neutral-700 mb-4">Permissions</h3>
        <select-input
          label="Access Level"
          id="accessLevel"
          name="accessLevel"
          formControlName="accessLevel"
          [options]="accessLevelOptions"
        >
        </select-input>
        <p class="text-xs text-neutral-400 mt-2">
          Level 0 is lowest (read-only), Level 5 is highest (admin).
        </p>
      </div>

      <!-- Actions -->
      <div class="pt-6 mt-6 border-t border-neutral-100 space-y-6">
        <h3 class="text-lg font-semibold text-neutral-700">Account Actions</h3>

        <div class="flex flex-col sm:flex-row gap-4">
          <ui-button type="submit" text="Save Changes" variant="primary" [isLoading]="isSaving()">
          </ui-button>

          <ui-button
            type="button"
            [text]="m.status === 'Active' ? 'Deactivate User' : 'Activate User'"
            [variant]="m.status === 'Active' ? 'secondary' : 'primary'"
            (clicked)="toggleStatus()"
            [isLoading]="isSaving()"
          >
          </ui-button>
        </div>
      </div>
    </form>
  </div>
</div>
