<a
  routerLink="/inventory"
  class="text-sm text-slate-500 cursor-pointer underline flex items-center gap-2 mb-4"
  ><mat-icon class="text-sm">arrow_back</mat-icon> Back</a
>
<div class="bg-white rounded-xl shadow-2xs p-6">
  <h1 class="text-sm text-slate-500">Product Details</h1>
  <h1 class="text-2xl text-primary">{{ product()?.name }}</h1>
  <form class="mt-4">
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="name">Product Name</label>
        <input-field
          type="text"
          [value]="product()?.name || ''"
          placeholder="Enter product name"
          name="product_name"
        ></input-field>
      </div>
      <div class="flex flex-col gap-2">
        <label for="unit">Unit</label>
        <select-input
          [options]="units"
          [value]="product()?.unit || ''"
          placeholder="Select unit"
          name="unit"
        ></select-input>
      </div>
      <div class="flex flex-col gap-2">
        <label for="current_stock">Current Stock</label>
        <input-field
          type="number"
          [value]="product()?.current_stock?.toString() || ''"
          placeholder="Enter current stock"
          name="current_stock"
        ></input-field>
      </div>
      <div class="flex flex-col gap-2">
        <label for="reorder_level">Reorder Level</label>
        <input-field
          type="number"
          [value]="product()?.reorder_level?.toString() || ''"
          placeholder="Enter reorder level"
          name="reorder_level"
        ></input-field>
      </div>
      <div class="flex flex-col gap-2">
        <label for="cost_per_unit">Cost Per Unit</label>
        <input-field
          type="number"
          [value]="product()?.cost_per_unit?.toString() || ''"
          placeholder="Enter cost per unit"
          name="cost_per_unit"
        ></input-field>
      </div>
    </div>
    <div class="flex items-center gap-2 my-4">
      <ui-button text="Update Product" radius="xl" variant="black"></ui-button>
    </div>
  </form>
  <div class="flex items-center gap-2 my-4 border-t border-slate-200 pt-4">
    <ui-button text="Inactive Product" radius="xl" variant="secondary"></ui-button>
    <ui-button text="Delete Product" radius="xl" variant="black"></ui-button>
  </div>
</div>
